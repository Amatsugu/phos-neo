name: Release

on:
    workflow_dispatch:
        inputs:
            version:
                description: "Version number in the format `v1.2.3`"
                required: true
                type: string
            build_for_windows:
                description: "Build for Windows"
                default: true
                type: boolean
            build_for_linux:
                description: "Build for Linux"
                default: true
                type: boolean
            upload_to_gitea:
                description: "Upload to Gitea releases"
                default: true
                type: boolean
            deny_warnings:
                description: "Deny warnings"
                default: false
                type: boolean
    push:
        tags:
            - "v*"

concurrency:
    group: ${{ gitea.workflow }}-${{ gitea.ref || gitea.run_id }}
    cancel-in-progress: true

env:
    cargo_build_binary_name: phos
    assets_path: game/main/assets
    libs_path: lib
    app_package_name: phos
    git_lfs: true
    continuous_deployment_to_itch: true

jobs:
    get-version:
        runs-on: ubuntu-latest
        outputs:
            version: ${{ steps.determine-and-create.outputs.version }}
        steps:
            - uses: actions/checkout@v4

            - name: Determine Version and Pre-create Gitea Release
              id: determine-and-create
              env:
                  GITEA_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  INPUT_VERSION: ${{ inputs.version }}
                  REF_NAME: ${{ gitea.ref_name }}
              run: |
                  set -e

                  # 1. Safe extraction falling back from input to context tag ref
                  if [ -n "$INPUT_VERSION" ]; then
                    CLEAN_VERSION="$INPUT_VERSION"
                  elif [ -n "$REF_NAME" ]; then
                    CLEAN_VERSION="$REF_NAME"
                  else
                    # Last ditch fallback from raw event reference path
                    CLEAN_VERSION="${GITEA_REF#refs/tags/}"
                  fi

                  # Sanitize potential formatting artifacts
                  CLEAN_VERSION=$(echo "$CLEAN_VERSION" | xargs)

                  echo "Processing build pipeline for version tag: '$CLEAN_VERSION'"

                  if [ -z "$CLEAN_VERSION" ] || [ "$CLEAN_VERSION" = "main" ] || [[ "$CLEAN_VERSION" == refs/heads/* ]]; then
                     echo "Error: Version extraction failed or incorrectly caught a branch ref."
                     exit 1
                  fi

                  # Save it to outputs immediately so downstream matrix jobs can read it
                  echo "version=$CLEAN_VERSION" >> "$GITEA_OUTPUT"

                  # 2. Pre-create the release block using the localized variable
                  if [ '${{ inputs.upload_to_gitea || 'true' }}' = 'true' ] || [ "${{ gitea.event_name }}" = "push" ]; then
                      echo "Ensuring release target exists on remote instance..."

                      HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" -X POST "${{ gitea.server_url }}/api/v1/repos/${{ gitea.repository }}/releases" \
                        -H "accept: application/json" \
                        -H "Authorization: token $GITEA_TOKEN" \
                        -H "Content-Type: application/json" \
                        -d "{\"tag_name\":\"$CLEAN_VERSION\",\"target_commitish\":\"${{ gitea.sha }}\",\"name\":\"$CLEAN_VERSION\",\"draft\":false,\"prerelease\":false}")

                      echo "Gitea API responded with status code: $HTTP_STATUS"

                      # 201 = Created, 409 = Conflict/Already Exists (both are safe paths to continue)
                      if [ "$HTTP_STATUS" != "201" ] && [ "$HTTP_STATUS" != "409" ]; then
                         echo "Error: Server failed to process release creation block."
                         exit 1
                      fi
                  fi

    build:
        needs:
            - get-version
        env:
            version: ${{ needs.get-version.outputs.version }}
        strategy:
            matrix:
                include:
                    - platform: linux
                      targets: x86_64-unknown-linux-gnu
                      package_ext: .zip
                      runner: ubuntu-latest

                    - platform: windows
                      targets: x86_64-pc-windows-gnu
                      binary_ext: .exe
                      package_ext: .zip
                      runner: ubuntu-latest
        runs-on: ubuntu-latest
        defaults:
            run:
                shell: bash

        steps:
            - name: Set up environment
              run: |
                  echo "app_binary_name=${app_binary_name:=${{ env.cargo_build_binary_name }}}" >> "${GITEA_ENV}"
                  echo "app_package_name=${app_package_name:=${app_binary_name}}" >> "${GITEA_ENV}"
                  echo "app=tmp/app/${app_package_name}" >> "${GITEA_ENV}"
                  echo "package=${app_package_name}-"'${{ matrix.platform }}${{ matrix.package_ext }}' >> "${GITEA_ENV}"

                  RUSTFLAGS='-Zthreads=0'
                  if [ '${{ matrix.platform }}' != 'windows' ]; then
                    RUSTFLAGS="${RUSTFLAGS:+$RUSTFLAGS }"'-Zshare-generics=y'
                  fi
                  if [ '${{ matrix.platform }}' = 'linux' ]; then
                    RUSTFLAGS="${RUSTFLAGS:+$RUSTFLAGS }"'-C link-arg=-Wl,-rpath,$ORIGIN'
                  fi

                  if [ '${{ inputs.deny_warnings }}' = 'true' ]; then
                    RUSTFLAGS="${RUSTFLAGS:+$RUSTFLAGS }"'-Dwarnings'
                  fi
                  echo "RUSTFLAGS=${RUSTFLAGS}" >> "${GITEA_ENV}"

                  # Fallback robust shell script verification to calculate build inclusion status
                  PLATFORM="${{ matrix.platform }}"
                  EVENT_NAME="${{ gitea.event_name }}"

                  # Default flags from Manual Input settings or default values
                  BUILD_LINUX="${{ inputs.build_for_linux || 'true' }}"
                  BUILD_WINDOWS="${{ inputs.build_for_windows || 'true' }}"
                  ITCH_CD="${{ env.continuous_deployment_to_itch }}"

                  IS_ENABLED="false"

                  if [ "$EVENT_NAME" = "push" ]; then
                      if [ "$PLATFORM" = "linux" ] || [ "$PLATFORM" = "windows" ]; then
                          IS_ENABLED="true"
                      fi
                  else
                      # Handles manual workflow runs
                      if [ "$PLATFORM" = "linux" ] && [ "$BUILD_LINUX" = "true" ]; then
                          IS_ENABLED="true"
                      elif [ "$PLATFORM" = "windows" ] && [ "$BUILD_WINDOWS" = "true" ]; then
                          IS_ENABLED="true"
                      fi
                  fi

                  echo "is_platform_enabled=${IS_ENABLED}" >> "${GITEA_ENV}"

            - name: Checkout repository
              if: ${{ env.is_platform_enabled == 'true' }}
              uses: actions/checkout@v4
              with:
                  lfs: ${{ env.git_lfs }}

            - name: Install Rust toolchain
              if: ${{ env.is_platform_enabled == 'true' }}
              uses: dtolnay/rust-toolchain@nightly
              with:
                  targets: ${{ matrix.targets }}

            - name: Restore Rust cache
              if: ${{ env.is_platform_enabled == 'true' && gitea.event_name == 'push' }}
              uses: Swatinem/rust-cache@v2
              with:
                  shared-key: release
                  save-if: ${{ gitea.ref == 'refs/heads/main' }}

            - name: Install build dependencies (Linux & Windows Cross-Compile)
              if: ${{ env.is_platform_enabled == 'true' && (matrix.platform == 'linux' || matrix.platform == 'windows') }}
              run: |
                  sudo apt-get update
                  if [ '${{ matrix.platform }}' = 'linux' ]; then
                    sudo apt-get install -y --no-install-recommends libasound2-dev libudev-dev libwayland-dev libxkbcommon-dev
                  fi
                  if [ '${{ matrix.platform }}' = 'windows' ]; then
                    sudo apt-get install -y --no-install-recommends mingw-w64
                  fi

            - name: Prepare output directories
              if: ${{ env.is_platform_enabled == 'true' }}
              run: rm -rf tmp; mkdir -p tmp/binary '${{ env.app }}'

            - name: Install cargo-binstall
              if: ${{ env.is_platform_enabled == 'true' }}
              uses: cargo-bins/cargo-binstall@main

            - name: Install Bevy CLI
              if: ${{ env.is_platform_enabled == 'true' }}
              run: cargo binstall --version 0.1.0-alpha.2 --locked --no-confirm --force --git='https://github.com/TheBevyFlock/bevy_cli' bevy_cli

            - name: Build and add binaries to app
              if: ${{ env.is_platform_enabled == 'true' }}
              run: |
                  for target in ${{ matrix.targets }}; do
                    bevy build --locked --release --target="${target}" --features='${{ matrix.features }}'
                    mv target/"${target}"/release/'${{ env.cargo_build_binary_name }}${{ matrix.binary_ext }}' tmp/binary/"${target}"'${{ matrix.binary_ext }}'
                  done
                  mv tmp/binary/*'${{ matrix.binary_ext }}' '${{ env.app }}/${{ env.app_binary_name }}${{ matrix.binary_ext }}'

            - name: Add assets to app
              if: ${{ env.is_platform_enabled == 'true' }}
              run: cp -R ./'${{ env.assets_path }}' '${{ env.app }}' || true

            - name: Add platform libraries
              if: ${{ env.is_platform_enabled == 'true' }}
              run: cp -R ./'${{ env.libs_path }}'/'${{ matrix.platform }}'/* '${{ env.app }}' || true

            - name: Package app
              if: ${{ env.is_platform_enabled == 'true' }}
              working-directory: tmp/app
              run: |
                  zip --recurse-paths '${{ env.package }}' '${{ env.app_package_name }}'

            - name: Upload package to workflow artifacts
              if: ${{ env.is_platform_enabled == 'true' }}
              uses: actions/upload-artifact@v3
              with:
                  path: tmp/app/${{ env.package }}
                  name: package-${{ matrix.platform }}
                  retention-days: 1

            - name: Upload package to Gitea release
              if: ${{ env.is_platform_enabled == 'true' && (inputs.upload_to_gitea || gitea.event_name == 'push') }}
              env:
                  GITEA_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  echo "Uploading to release for tag: ${{ env.version }}"

                  # Safely extracts ID now that env.version is correctly initialized from job context
                  RELEASE_ID=$(curl -s -H "Authorization: token $GITEA_TOKEN" "${{ gitea.server_url }}/api/v1/repos/${{ gitea.repository }}/releases/tags/${{ env.version }}" | jq '.id // empty')

                  if [ -z "$RELEASE_ID" ] || [ "$RELEASE_ID" = "null" ]; then
                     echo "Error: Failed to track down a valid Gitea Release ID for version tag ${{ env.version }}"
                     exit 1
                  fi

                  FILE_PATH="tmp/app/${{ env.package }}"
                  FILE_NAME="${{ env.package }}"

                  echo "Uploading $FILE_NAME to release ID $RELEASE_ID..."
                  curl -s -X POST "${{ gitea.server_url }}/api/v1/repos/${{ gitea.repository }}/releases/$RELEASE_ID/assets" \
                    -H "accept: application/json" \
                    -H "Authorization: token $GITEA_TOKEN" \
                    -H "Content-Type: multipart/form-data" \
                    -F "attachment=@$FILE_PATH;filename=$FILE_NAME"
