name: CI

on:
    push:
        branches: [master]
    pull_request:
        branches: [master]

concurrency:
    group: ${{ github.workflow }}-${{ github.ref || github.run_id }}
    cancel-in-progress: true

env:
    RUSTFLAGS: -Dwarnings -Zshare-generics=y -Zthreads=0
    RUSTDOCFLAGS: -Dwarnings -Zshare-generics=y -Zthreads=0
    toolchain: nightly-2026-01-22

jobs:
    format:
        name: Format
        runs-on: ubuntu-latest
        timeout-minutes: 10
        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Install Rust toolchain
              uses: dtolnay/rust-toolchain@master
              with:
                  toolchain: ${{ env.toolchain }}
                  components: rustfmt

            - name: Check formatting
              run: |
                  if ! cargo fmt --all -- --check; then
                    echo "::error title=Format Check Failed::Code formatting errors found! Run 'cargo fmt' locally to fix."
                    exit 1
                  fi

    docs:
        name: Docs
        runs-on: ubuntu-latest
        timeout-minutes: 20
        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Install Rust toolchain
              uses: dtolnay/rust-toolchain@master
              with:
                  toolchain: ${{ env.toolchain }}

            - name: Restore Rust cache
              id: cache
              uses: Swatinem/rust-cache@v2
              with:
                  shared-key: ci
                  save-if: false

            - name: Install build dependencies
              if: steps.cache.outputs.cache-hit != 'true'
              run: sudo apt-get update; sudo apt-get install -y --no-install-recommends libasound2-dev libudev-dev libwayland-dev

            - name: Check documentation
              run: |
                  if ! cargo doc --locked --workspace --profile ci --all-features --document-private-items --no-deps; then
                    echo "::error title=Docs Build Failed::Documentation generation failed. Check for missing types or broken intra-doc links."
                    exit 1
                  fi

    clippy-lints:
        name: Clippy lints
        runs-on: ubuntu-latest
        timeout-minutes: 20
        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Install Rust toolchain
              uses: dtolnay/rust-toolchain@master
              with:
                  toolchain: ${{ env.toolchain }}
                  components: clippy

            - name: Restore Rust cache
              id: cache
              uses: Swatinem/rust-cache@v2
              with:
                  shared-key: ci
                  save-if: ${{ github.ref == 'refs/heads/main' }}

            - name: Install build dependencies
              if: steps.cache.outputs.cache-hit != 'true'
              run: sudo apt-get update; sudo apt-get install -y --no-install-recommends libasound2-dev libudev-dev libwayland-dev

            - name: Run Clippy lints
              run: |
                  if ! cargo clippy --locked --workspace --all-targets --profile ci --all-features 2> clippy_output.txt; then
                    # Extract the trailing summary count line out of the compiler output file
                    CLIPPY_SUMMARY=$(tail -n 2 clippy_output.txt | tr '\n' ' ')
                    echo "::error title=Clippy Lints Failed::$CLIPPY_SUMMARY"
                    cat clippy_output.txt >&2
                    exit 1
                  fi

    bevy-lints:
        name: Bevy lints
        runs-on: ubuntu-latest
        timeout-minutes: 20
        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Install Rust toolchain (plus bevy_lint)
              uses: TheBevyFlock/bevy_cli/bevy_lint@lint-v0.6.0
              with:
                  cache: true
                  save-cache-if: ${{ github.ref == 'refs/heads/main' }}

            - name: Restore Rust cache
              id: cache
              uses: Swatinem/rust-cache@v2
              with:
                  shared-key: ci
                  save-if: false

            - name: Install build dependencies
              if: steps.cache.outputs.cache-hit != 'true'
              run: sudo apt-get update; sudo apt-get install -y --no-install-recommends libasound2-dev libudev-dev libwayland-dev

            - name: Run Bevy lints
              run: |
                  if ! bevy_lint --locked --workspace --all-targets --profile ci --all-features 2> bevy_output.txt; then
                    echo "::error title=Bevy Architecture Lint Failed::System structures do not conform to engine layout rules. See logs."
                    cat bevy_output.txt >&2
                    exit 1
                  fi

    tests:
        name: Tests
        runs-on: ubuntu-latest
        timeout-minutes: 40
        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Set up environment
              run: echo "RUSTFLAGS=${RUSTFLAGS:+$RUSTFLAGS }-Zcodegen-backend=cranelift" >> "${GITHUB_ENV}"

            - name: Install Rust toolchain
              uses: dtolnay/rust-toolchain@master
              with:
                  toolchain: ${{ env.toolchain }}
                  components: rustc-codegen-cranelift-preview

            - name: Restore Rust cache
              uses: Swatinem/rust-cache@v2
              with:
                  shared-key: test
                  cache-directories: ${{ env.LD_LIBRARY_PATH }}
                  save-if: ${{ github.ref == 'refs/heads/main' }}

            - name: Install build dependencies
              run: sudo apt-get update; sudo apt-get install -y --no-install-recommends libasound2-dev libudev-dev libwayland-dev

            - name: Run tests
              run: |
                  if ! cargo test --locked --workspace --all-targets --profile ci --no-fail-fast 2>&1 | tee test_results.txt; then
                    # Isolate exact failures and total tallies to put directly on Gitea's main screen
                    TEST_SUMMARY=$(grep -E "FAILED|test result:.*" test_results.txt | tr '\n' ' ')
                    echo "::error title=Test Suite Regressions Found::$TEST_SUMMARY"
                    exit 1
                  fi
